<div class="setup-container">
  <button type="button" class="back-btn" (click)="goBack()">{{ i18n.t('common.back') }}</button>

  <div class="setup-content">
    <h1>{{ i18n.t('gameSetup.title') }}</h1>
    <p class="setup-subtitle">{{ i18n.t('gameSetup.subtitle') }}</p>

    <div class="option-group">
      <h3>{{ i18n.t('gameSetup.bestOfSets') }}</h3>
      <div class="option-buttons">
        @for (s of setsOptions; track s) {
          <button
            type="button"
            class="option-btn"
            [class.active]="selectedSets() === s"
            (click)="selectSets(s)"
          >
            {{ s }}
          </button>
        }
      </div>
    </div>

    <div class="option-group">
      <h3>{{ i18n.t('gameSetup.legsPerSet') }}</h3>
      <div class="option-buttons">
        @for (l of legsOptions; track l) {
          <button
            type="button"
            class="option-btn"
            [class.active]="selectedLegs() === l"
            (click)="selectLegs(l)"
          >
            {{ l }}
          </button>
        }
      </div>
    </div>

    <button type="button" class="play-btn" (click)="startGame()">🎯 {{ i18n.t('gameSetup.startMatch') }}</button>
  </div>
</div>
