<div class="dashboard-container">
  <header class="dashboard-header">
    <h1>🎯 Dashboard</h1>
    <div class="header-actions">
      <button type="button" class="icon-btn" title="Profile" (click)="goToProfile()">👤</button>
      <button type="button" class="icon-btn" title="Settings" (click)="goToSettings()">⚙️</button>
    </div>
  </header>

  <section class="games-section">
    <h2>Select a Game</h2>
    <div class="games-grid">
      @for (game of games; track game.id) {
        <button
          type="button"
          class="game-card"
          [class.disabled]="!game.enabled"
          [attr.title]="game.enabled ? game.title : 'Coming soon'"
          (click)="selectGame(game)"
        >
          <span class="game-icon">{{ game.icon }}</span>
          <span class="game-title">{{ game.title }}</span>
          <span class="game-desc">{{ game.description }}</span>
          @if (!game.enabled) {
            <span class="coming-soon">Coming Soon</span>
          }
        </button>
      }
    </div>
  </section>
</div>
