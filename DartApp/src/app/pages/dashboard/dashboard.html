<div class="dashboard-container">
  <header class="dashboard-header">
    <h1>🎯 {{ i18n.t('dashboard.title') }}</h1>
    <div class="header-actions">
      <button type="button" class="icon-btn" [title]="i18n.t('dashboard.profile')" (click)="goToProfile()">👤</button>
      <button type="button" class="icon-btn" [title]="i18n.t('dashboard.settings')" (click)="goToSettings()">⚙️</button>
    </div>
  </header>

  <section class="games-section">
    <h2>{{ i18n.t('dashboard.selectGame') }}</h2>
    <div class="games-grid">
      @for (game of games; track game.id) {
        <button
          type="button"
          class="game-card"
          [class.disabled]="!game.enabled"
          [attr.title]="game.enabled ? i18n.t(game.titleKey) : i18n.t('common.comingSoon')"
          (click)="selectGame(game)"
        >
          <span class="game-icon">{{ game.icon }}</span>
          <span class="game-title">{{ i18n.t(game.titleKey) }}</span>
          <span class="game-desc">{{ i18n.t(game.descKey) }}</span>
          @if (!game.enabled) {
            <span class="coming-soon">{{ i18n.t('common.comingSoon') }}</span>
          }
        </button>
      }
    </div>
  </section>
</div>
